<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>문법 테스트 - 학생</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="/student">어휘 테스트</a>
    <a href="/grammar" class="active">문법 테스트</a>
  </nav>
  <h1>문법 테스트 (학생)</h1>

  <div id="setup-screen">
    <div class="row">
      <label for="book-select">교재 선택:</label>
      <select id="book-select">
        {% for id, name in books.items() %}
        <option value="{{ id }}">{{ name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="row">
      <label for="lesson-select">과 선택:</label>
      <select id="lesson-select">
        {% for n in lessons %}
        <option value="{{ n }}">{{ n }}과</option>
        {% endfor %}
      </select>
    </div>
    <div class="row">
      <button id="start-btn">테스트 시작</button>
    </div>
    <div id="setup-message"></div>
  </div>

  <div id="quiz-screen" style="display:none">
    <div id="quiz-progress"></div>
    <div id="quiz-prompt"></div>
    <div id="grammar-answer-row">
      <input type="text" id="grammar-answer-input" class="typing-input" placeholder="답을 입력하세요" autocomplete="off">
      <button id="submit-answer-btn">확인</button>
      <span id="grade-mark" class="grade-mark"></span>
    </div>
    <div id="grammar-correct-answer"></div>
  </div>

  <div id="result-screen" style="display:none">
    <div id="result-box"></div>
    <div class="row">
      <button id="finish-btn" class="secondary">테스트 종료</button>
      <button id="retry-wrong-btn">틀린 문제 다시 풀기</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='grammar.js') }}"></script>
</body>
</html>
